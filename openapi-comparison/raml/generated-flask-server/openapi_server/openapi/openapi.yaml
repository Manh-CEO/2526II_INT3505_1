    get:
      description: Lﾃ溪舞ﾃ惣 danh s笏愿ｭch tﾃ溪舞ﾃ奏 cﾃ溪舞ﾃｺ c笏愿ｭc cuﾃ溪風ﾃｦn s笏愿ｭch
      operationId: g_et_books
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Book"
                type: array
          description: ""
      x-openapi-router-controller: openapi_server.controllers.default_controller
    post:
      description: Th笏慊ｬm mﾃ溪風ﾃ釦 cuﾃ溪風ﾃｦn s笏愿ｭch mﾃ溪風ﾂ｢i
      operationId: p_ost_books
