        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
          description: ""
      x-openapi-router-controller: openapi_server.controllers.default_controller
  /books/{id}:
    get:
      description: Lﾃ溪舞ﾃ惣 th笏懌筈ng tin chi tiﾃ溪舞笏腎 cﾃ溪風ﾂｺa mﾃ溪風ﾃ釦 cuﾃ溪風ﾃｦn s笏愿ｭch
      operationId: g_et_books_id
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GET_books_id_404_response"
          description: ""
      x-openapi-router-controller: openapi_server.controllers.default_controller
