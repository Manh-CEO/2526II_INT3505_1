openapi: 3.0.0
info:
  title: API Quản lý Sách
  description: Tài liệu chuẩn OpenAPI cho hệ thống quản lý sách.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local Development Server

paths:
  /books:
    get:
      summary: Lấy danh sách toàn bộ sách
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      summary: Thêm một cuốn sách mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '201':
          description: Đã tạo sách thành công

  /books/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: ID của cuốn sách
        schema:
          type: integer
    get:
      summary: Lấy thông tin sách theo ID
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Không tìm thấy sách
    put:
      summary: Cập nhật thông tin sách
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookInput'
      responses:
        '200':
          description: Cập nhật thành công
    delete:
      summary: Xóa một cuốn sách
      responses:
        '200':
          description: Xóa thành công

components:
  schemas:
    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Nhà Giả Kim"
        author:
          type: string
          example: "Paulo Coelho"
    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: "Cha Giàu Cha Nghèo"
        author:
          type: string
          example: "Robert Kiyosaki"